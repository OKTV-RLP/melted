name: Build deb packages

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Default to a read-only token; the release job opts into write explicitly.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    permissions:
      contents: read    # build/test only - no write access for PR code
    steps:
      # Toolchain + tools needed before/around checkout. The actual package
      # build dependencies are installed from debian/control further down, so
      # they are not duplicated here.
      - name: Install base tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates git dpkg-dev build-essential devscripts equivs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history + tags, needed for git describe

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install build dependencies from debian/control
        run: |
          mk-build-deps --install --remove \
            --tool 'apt-get -o Debug::pkgProblemResolver=yes --no-install-recommends -y' \
            debian/control

      - name: Build packages
        run: ./build-deb.sh --auto-version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: melted-deb
          path: dist/*.deb
          if-no-files-found: error

  release:
    # Attach the built packages to the GitHub release - only on v* tags, where
    # the write-capable token is never exposed to untrusted pull-request code.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: melted-deb
          path: dist

      - name: Attach packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
